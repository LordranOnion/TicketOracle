<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TicketOracle - Find Your Next Concert</title>
    <style>
        :root { --accent: #00e5ff; --bg: #0f0f13; --card: #1c1c24; --text: #fff; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        
        /* Layout */
        header { text-align: center; margin-bottom: 40px; }
        h1 { font-size: 2.5rem; margin: 0; background: -webkit-linear-gradient(45deg, #00e5ff, #2979ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p.subtitle { color: #888; margin-top: 5px; }

        .nav-buttons { display: flex; gap: 12px; justify-content: center; margin-top: 15px; }
        .nav-buttons button {
            padding: 10px 20px;
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
            font-size: 0.9rem;
        }
        .nav-buttons button:hover { background: rgba(0, 229, 255, 0.1); }

        .container { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 2fr 1fr; gap: 30px; }
        
        /* Event Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
        .card { background: var(--card); border: 1px solid #333; border-radius: 12px; padding: 15px; transition: transform 0.2s; cursor: pointer; position: relative; overflow: hidden; }
        .card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .card h3 { margin: 0 0 5px 0; font-size: 1.1rem; }
        .card .meta { font-size: 0.85rem; color: #aaa; display: flex; justify-content: space-between; margin-top: 10px; }
        .card .city { background: #333; padding: 2px 6px; border-radius: 4px; font-size: 0.75rem; }

        /* Checkout/Price Panel */
        .sidebar { position: sticky; top: 20px; height: fit-content; background: #16161e; padding: 25px; border-radius: 16px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .sidebar h2 { margin-top: 0; border-bottom: 1px solid #333; padding-bottom: 15px; }
        
        select { width: 100%; padding: 12px; background: #000; color: white; border: 1px solid #444; border-radius: 6px; margin-bottom: 15px; font-size: 1rem; }
        button#bring-btn { width: 100%; padding: 14px; background: linear-gradient(90deg, #00e5ff, #2979ff); border: none; border-radius: 6px; color: #000; font-weight: bold; font-size: 1rem; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }
        button#bring-btn:hover { opacity: 0.9; }

        /* The Result Area (SSRF Sink) */
        #price-result { 
            margin-top: 20px; 
            background: #000; 
            border: 1px solid #333; 
            border-radius: 6px; 
            padding: 15px; 
            min-height: 50px; 
            font-family: 'Consolas', monospace; 
            font-size: 0.9rem; 
            color: var(--accent); 
            white-space: pre-wrap;
            overflow-x: auto;
        }
        .label { font-size: 0.8rem; color: #666; margin-bottom: 5px; display: block; }

    </style>
</head>
<body>

<header>
    <h1>TicketMaster<span style="font-weight:300">AI</span></h1>
    <p class="subtitle">Secure Event Booking & Price Checker</p>
    <div class="nav-buttons">
        <button onclick="window.location.href='/chat'">&#128172; Talk to AI Assistant</button>
        <button onclick="window.location.href='/upload'">&#128206; Upload Files</button>
    </div>
</header>

<div class="container">
    
    <div class="grid" id="events-grid">
        <div class="card" style="opacity: 0.5;">Loading events...</div>
    </div>

    <div class="sidebar">
        <h2>Check Availability</h2>
        
        <label class="label">SELECT EVENT ID</label>
        <select id="event-select">
            <option>Loading...</option>
        </select>
        
        <button id="bring-btn">Check Price</button>
        
        <div style="margin-top: 20px;">
            <span class="label">SYSTEM RESPONSE</span>
            <div id="price-result">// Waiting for input...</div>
        </div>
    </div>

</div>

<script>
    // 1. Load Events
    fetch('/events').then(res => res.json()).then(data => {
        const grid = document.getElementById('events-grid');
        const select = document.getElementById('event-select');
        
        grid.innerHTML = '';
        select.innerHTML = '';

        data.forEach(ev => {
            // Populate Grid Card
            const card = document.createElement('div');
            card.className = 'card';
            card.onclick = () => { select.value = ev.id; };
            card.innerHTML = `
                <h3>${ev.name}</h3>
                <div class="meta">
                    <span>&#128197; ${ev.date}</span>
                    <span class="city">&#128205; ${ev.city}</span>
                </div>
            `;
            grid.appendChild(card);

            // Populate Dropdown
            const option = document.createElement('option');
            option.value = ev.id;
            option.textContent = `#${ev.id} - ${ev.name}`;
            select.appendChild(option);
        });
    });

    // 2. Check Price (The Vulnerable Action)
    document.getElementById('bring-btn').onclick = function() {
        const eventId = document.getElementById('event-select').value;
        const resultBox = document.getElementById('price-result');
        
        resultBox.textContent = "Fetching...";
        resultBox.style.color = "#888";

        fetch('/price', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ event_id: eventId })
        })
        .then(res => res.json())
        .then(data => {
            resultBox.style.color = "#00e5ff";
            
            if (data.price) {
                resultBox.innerHTML = `&#10004; AVAILABLE\nPrice: &euro;${data.price}`;
            } 
            else if (data.content) {
                try {
                    const json = JSON.parse(data.content);
                    resultBox.textContent = JSON.stringify(json, null, 2);
                } catch {
                    resultBox.textContent = data.content;
                }
            } 
            else {
                resultBox.style.color = "#ff5252";
                resultBox.textContent = "Error: " + (data.error || "Unknown");
            }
        })
        .catch(err => {
            resultBox.style.color = "#ff5252";
            resultBox.textContent = "System Error: " + err;
        });
    }
</script>
</body>
</html>
