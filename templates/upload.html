<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TicketOracle - File Upload</title>
    <style>
        :root { --accent: #00e5ff; --bg: #0f0f13; --card: #1c1c24; --text: #fff; --danger: #ff5252; --success: #4caf50; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; box-sizing: border-box; }

        header { text-align: center; margin-bottom: 30px; width: 100%; max-width: 900px; position: relative; }
        h1 { font-size: 2rem; margin: 0; background: -webkit-linear-gradient(45deg, #00e5ff, #2979ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .back-btn { position: absolute; left: 0; top: 5px; color: #888; text-decoration: none; font-size: 0.9rem; }
        .back-btn:hover { color: var(--accent); }
        p.subtitle { color: #888; margin-top: 5px; font-size: 0.9rem; }

        .main-container { width: 100%; max-width: 900px; display: flex; flex-direction: column; gap: 25px; }

        /* ---- Drop Zone ---- */
        .upload-zone {
            background: var(--card);
            border: 2px dashed #444;
            border-radius: 12px;
            padding: 50px 30px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.3s, background 0.3s;
            position: relative;
        }
        .upload-zone:hover, .upload-zone.dragover {
            border-color: var(--accent);
            background: rgba(0, 229, 255, 0.04);
        }
        .upload-zone .icon { font-size: 3rem; margin-bottom: 10px; display: block; }
        .upload-zone .label { font-size: 1.1rem; color: #ccc; }
        .upload-zone .hint { font-size: 0.8rem; color: #666; margin-top: 8px; }
        .upload-zone input[type="file"] { display: none; }
        .upload-zone .browse-link { color: var(--accent); text-decoration: underline; cursor: pointer; }

        /* ---- Progress Bar ---- */
        .progress-wrapper { display: none; margin-top: 15px; }
        .progress-bar-bg { width: 100%; height: 6px; background: #333; border-radius: 3px; overflow: hidden; }
        .progress-bar-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #00e5ff, #2979ff); border-radius: 3px; transition: width 0.3s; }
        .progress-text { font-size: 0.8rem; color: #888; margin-top: 5px; text-align: center; }

        /* ---- Status Messages ---- */
        .status-msg { padding: 10px 15px; border-radius: 6px; font-size: 0.85rem; display: none; margin-top: 10px; }
        .status-msg.success { display: block; background: rgba(76, 175, 80, 0.15); border: 1px solid #4caf50; color: #4caf50; }
        .status-msg.error { display: block; background: rgba(255, 82, 82, 0.15); border: 1px solid #ff5252; color: #ff5252; }

        /* ---- File List ---- */
        .files-section h2 { font-size: 1.2rem; margin: 0 0 15px 0; color: #ccc; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .file-list { display: flex; flex-direction: column; gap: 8px; }
        .file-list-empty { color: #555; font-size: 0.9rem; font-style: italic; padding: 20px; text-align: center; }

        .file-row {
            background: var(--card);
            border: 1px solid #333;
            border-radius: 8px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 14px;
            transition: border-color 0.2s;
        }
        .file-row:hover { border-color: #555; }

        .file-icon {
            width: 42px; height: 42px;
            border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.7rem; font-weight: bold; text-transform: uppercase; letter-spacing: 1px;
            flex-shrink: 0;
        }
        .file-icon.jpg, .file-icon.jpeg, .file-icon.png { background: rgba(0, 229, 255, 0.15); color: var(--accent); }
        .file-icon.pdf { background: rgba(255, 82, 82, 0.15); color: var(--danger); }
        .file-icon.txt { background: rgba(255, 255, 255, 0.08); color: #aaa; }

        .file-info { flex: 1; min-width: 0; }
        .file-name { font-size: 0.9rem; color: #eee; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .file-meta { font-size: 0.75rem; color: #666; margin-top: 3px; }

        .file-actions { display: flex; gap: 8px; flex-shrink: 0; }
        .file-actions a, .file-actions button {
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
            text-decoration: none;
            cursor: pointer;
            border: none;
            transition: opacity 0.2s;
        }
        .file-actions a:hover, .file-actions button:hover { opacity: 0.8; }
        .btn-view { background: rgba(0, 229, 255, 0.15); color: var(--accent); }
        .btn-delete { background: rgba(255, 82, 82, 0.12); color: var(--danger); }

        /* ---- Image Preview Thumbnails ---- */
        .file-thumb {
            width: 42px; height: 42px;
            border-radius: 6px;
            object-fit: cover;
            flex-shrink: 0;
            border: 1px solid #333;
        }
    </style>
</head>
<body>

<header>
    <a href="/" class="back-btn">&larr; Back to Events</a>
    <h1>File Upload</h1>
    <p class="subtitle">Upload ticket scans, receipts, or documents &mdash; JPG, PNG, TXT, PDF (max 10 MB)</p>
</header>

<div class="main-container">

    <!-- Upload Zone -->
    <div class="upload-zone" id="drop-zone">
        <span class="icon">&#128206;</span>
        <div class="label">Drag &amp; drop your file here</div>
        <div class="hint">or <span class="browse-link" id="browse-trigger">browse from your device</span></div>
        <input type="file" id="file-input" accept=".jpg,.jpeg,.png,.txt,.pdf">

        <div class="progress-wrapper" id="progress-wrapper">
            <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-fill"></div></div>
            <div class="progress-text" id="progress-text">Uploading...</div>
        </div>

        <div class="status-msg" id="status-msg"></div>
    </div>

    <!-- Uploaded Files List -->
    <div class="files-section">
        <h2>Uploaded Files</h2>
        <div class="file-list" id="file-list">
            <div class="file-list-empty" id="empty-state">No files uploaded yet.</div>
        </div>
    </div>

</div>

<script>
    const dropZone     = document.getElementById('drop-zone');
    const fileInput    = document.getElementById('file-input');
    const browseTrigger= document.getElementById('browse-trigger');
    const progressWrap = document.getElementById('progress-wrapper');
    const progressFill = document.getElementById('progress-fill');
    const progressText = document.getElementById('progress-text');
    const statusMsg    = document.getElementById('status-msg');
    const fileList     = document.getElementById('file-list');
    const emptyState   = document.getElementById('empty-state');

    // ---- Drag & Drop ----
    dropZone.addEventListener('click', (e) => {
        if (e.target === browseTrigger || e.target === dropZone || e.target.parentElement === dropZone) {
            fileInput.click();
        }
    });

    ['dragenter', 'dragover'].forEach(evt => {
        dropZone.addEventListener(evt, (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
    });
    ['dragleave', 'drop'].forEach(evt => {
        dropZone.addEventListener(evt, (e) => { e.preventDefault(); dropZone.classList.remove('dragover'); });
    });

    dropZone.addEventListener('drop', (e) => {
        const files = e.dataTransfer.files;
        if (files.length > 0) uploadFile(files[0]);
    });

    fileInput.addEventListener('change', () => {
        if (fileInput.files.length > 0) uploadFile(fileInput.files[0]);
    });

    // ---- Upload Logic ----
    function uploadFile(file) {
        // Client-side pre-check
        const allowed = ['jpg', 'jpeg', 'png', 'txt', 'pdf'];
        const ext = file.name.split('.').pop().toLowerCase();
        if (!allowed.includes(ext)) {
            showStatus('error', `File type ".${ext}" is not allowed. Use: ${allowed.join(', ')}`);
            return;
        }
        if (file.size > 10 * 1024 * 1024) {
            showStatus('error', 'File exceeds the 10 MB size limit.');
            return;
        }

        const formData = new FormData();
        formData.append('file', file);

        // Show progress
        statusMsg.style.display = 'none';
        statusMsg.className = 'status-msg';
        progressWrap.style.display = 'block';
        progressFill.style.width = '0%';
        progressText.textContent = `Uploading ${file.name}...`;

        const xhr = new XMLHttpRequest();
        xhr.open('POST', '/api/upload', true);

        xhr.upload.addEventListener('progress', (e) => {
            if (e.lengthComputable) {
                const pct = Math.round((e.loaded / e.total) * 100);
                progressFill.style.width = pct + '%';
                progressText.textContent = `Uploading ${file.name}... ${pct}%`;
            }
        });

        xhr.addEventListener('load', () => {
            progressWrap.style.display = 'none';
            fileInput.value = '';
            try {
                const data = JSON.parse(xhr.responseText);
                if (xhr.status === 200 && data.status === 'ok') {
                    showStatus('success', `"${data.file.original_name}" uploaded successfully.`);
                    loadFiles();
                } else {
                    showStatus('error', data.error || 'Upload failed.');
                }
            } catch {
                showStatus('error', 'Unexpected server response.');
            }
        });

        xhr.addEventListener('error', () => {
            progressWrap.style.display = 'none';
            fileInput.value = '';
            showStatus('error', 'Network error during upload.');
        });

        xhr.send(formData);
    }

    function showStatus(type, message) {
        statusMsg.className = `status-msg ${type}`;
        statusMsg.textContent = message;
        statusMsg.style.display = 'block';
        // Auto-hide success after 4s
        if (type === 'success') setTimeout(() => { statusMsg.style.display = 'none'; }, 4000);
    }

    // ---- File List ----
    function formatSize(bytes) {
        if (bytes < 1024) return bytes + ' B';
        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
        return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
    }

    function loadFiles() {
        fetch('/api/uploads')
            .then(r => r.json())
            .then(files => {
                // Clear existing rows (keep empty state element)
                fileList.querySelectorAll('.file-row').forEach(el => el.remove());

                if (files.length === 0) {
                    emptyState.style.display = 'block';
                    return;
                }
                emptyState.style.display = 'none';

                files.forEach(f => {
                    const row = document.createElement('div');
                    row.className = 'file-row';

                    const isImage = ['jpg', 'jpeg', 'png'].includes(f.file_type);
                    const fileUrl = `/uploads/${f.stored_name}`;

                    let iconHtml;
                    if (isImage) {
                        iconHtml = `<img class="file-thumb" src="${fileUrl}" alt="${f.original_name}">`;
                    } else {
                        iconHtml = `<div class="file-icon ${f.file_type}">${f.file_type}</div>`;
                    }

                    row.innerHTML = `
                        ${iconHtml}
                        <div class="file-info">
                            <div class="file-name" title="${f.original_name}">${f.original_name}</div>
                            <div class="file-meta">${formatSize(f.file_size)} &middot; ${f.uploaded_at}</div>
                        </div>
                        <div class="file-actions">
                            <a href="${fileUrl}" target="_blank" class="btn-view">View</a>
                            <button class="btn-delete" data-id="${f.id}">Delete</button>
                        </div>
                    `;
                    fileList.appendChild(row);
                });

                // Bind delete buttons
                fileList.querySelectorAll('.btn-delete').forEach(btn => {
                    btn.addEventListener('click', () => deleteFile(btn.dataset.id));
                });
            })
            .catch(() => {
                emptyState.textContent = 'Failed to load files.';
                emptyState.style.display = 'block';
            });
    }

    function deleteFile(fileId) {
        if (!confirm('Delete this file?')) return;
        fetch(`/api/uploads/${fileId}`, { method: 'DELETE' })
            .then(r => r.json())
            .then(data => {
                if (data.status === 'deleted') {
                    loadFiles();
                } else {
                    alert(data.error || 'Delete failed.');
                }
            })
            .catch(() => alert('Network error.'));
    }

    // Initial load
    loadFiles();
</script>
</body>
</html>
